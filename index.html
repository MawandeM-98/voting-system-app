<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South African Voting Eligibility Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🗳️ South African Voting Eligibility Checker</h1>
        
        <div class="form-group">
            <label>Are you a South African citizen?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="citizenship" value="yes" id="citizenYes"> Yes
                </label>
                <label>
                    <input type="radio" name="citizenship" value="no" id="citizenNo"> No
                </label>
            </div>
            <div id="citizenshipError" class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="age">What is your age?</label>
            <input type="text" id="age" placeholder="Enter your age">
            <div id="ageError" class="error-message"></div>
        </div>

        <button id="checkEligibility" class="check-btn">Check Eligibility</button>

        <div id="result" class="result"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
